version: '3.0'

services:

  localstack:
    image: localstack/localstack:3
    environment:
      - SERVICES=dynamodb,sqs,sns
      - DEBUG=0
    ports:
      - '4566:4566'
    volumes:
      - "localstack_data:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./init-localstack.sh:/etc/localstack/init/ready.d/init-localstack.sh"

  datadog-agent:
    image: datadog/agent:7
    container_name: datadog-agent
    environment:
      # ── Authentication ──────────────────────────────────────────────────
      - DD_API_KEY=${DD_API_KEY:?DD_API_KEY is required}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      # ── APM / Distributed Tracing ──────────────────────────────────────
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true          # accept traces from other containers
      # ── OTLP receiver (replaces the classic dd-java-agent approach) ────
      - DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_GRPC_ENDPOINT=0.0.0.0:4317
      - DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_HTTP_ENDPOINT=0.0.0.0:4318
      # ── Metrics ────────────────────────────────────────────────────────
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true    # accept DogStatsD from other containers
      # ── Logs ───────────────────────────────────────────────────────────
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_CONTAINER_EXCLUDE=name:datadog-agent
      # ── Unified Service Tagging ────────────────────────────────────────
      - DD_ENV=${DD_ENV:-local}
    ports:
      - "8125:8125/udp"   # DogStatsD
      - "4317:4317"        # OTLP gRPC  ← Spring Boot sends traces here
      - "4318:4318"        # OTLP HTTP  (optional alternative)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro


volumes:
  localstack_data:
    driver: local
