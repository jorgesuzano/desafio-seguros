server:
  port: 8080

spring:
  application:
    name: insurance-quote-service
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
    aws:
      region:
        static: sa-east-1
      stack:
        auto: false
      credentials:
        access-key: admin
        secret-key: admin
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

catalog-service:
  url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# ─── Resilience4j ────────────────────────────────────────────────────────────
resilience4j:

  # Circuit Breaker: protects catalog service, DynamoDB, and SQS publisher.
  circuitbreaker:
    configs:
      default:
        # COUNT_BASED: evaluate last N calls (vs TIME_BASED which uses a time window)
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        # Open circuit when ≥50% of last 10 calls fail
        failureRateThreshold: 50
        # Stay OPEN for 30 s before entering HALF_OPEN
        waitDurationInOpenState: 30s
        # Number of probe calls allowed in HALF_OPEN state
        permittedNumberOfCallsInHalfOpenState: 3
        # Automatically move from OPEN → HALF_OPEN after wait duration
        automaticTransitionFromOpenToHalfOpenEnabled: true
        # Register /actuator/health circuit breaker indicator
        registerHealthIndicator: true
        # Business validation errors must NOT count as infrastructure failures
        ignoreExceptions:
          - java.lang.IllegalArgumentException

    instances:
      # Catalog external HTTP service — small window (few calls per request)
      catalogService:
        baseConfig: default
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 20s

      # DynamoDB — medium sensitivity; longer wait gives AWS time to recover
      dynamoDb:
        baseConfig: default
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s

      # SQS publisher — non-fatal; open quickly to stop hammering a down queue
      sqsPublisher:
        baseConfig: default
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s

  # Retry: transient errors on the catalog service (e.g. network blip) are
  # retried once before the call counts as a failure for the circuit breaker.
  retry:
    instances:
      catalogService:
        maxAttempts: 2
        waitDuration: 300ms
        retryExceptions:
          - java.io.IOException
          - feign.RetryableException
          - feign.FeignException$ServiceUnavailable
          - feign.FeignException$GatewayTimeout

logging:
  level:
    root: INFO
    br.com.desafio.insurance: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

cloud:
  aws:
    region:
      static: sa-east-1
    stack:
      auto: false
    credentials:
      access-key: admin
      secret-key: admin
    dynamodb:
      endpoint: ${CLOUD_AWS_DYNAMODB_ENDPOINT:http://localhost:4566}
      table:
        name: insurance-quotes
    fila:
      insurance-quote-received: ${CLOUD_AWS_FILA_INSURANCE_QUOTE_RECEIVED:http://localhost:4566/000000000000/insurance-quote-received}
      insurance-policy-created: ${CLOUD_AWS_FILA_INSURANCE_POLICY_CREATED:http://localhost:4566/000000000000/insurance-policy-created}

aws:
  region: sa-east-1
  accessKey: admin
  secretKey: admin
  sqs:
    queue-url: ${CLOUD_AWS_FILA_INSURANCE_QUOTE_RECEIVED:http://localhost:4566/000000000000/insurance-quote-received}
    endpoint: ${AWS_SQS_ENDPOINT:http://localhost:4566}
